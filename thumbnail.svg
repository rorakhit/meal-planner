<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <!-- Background gradient for the rounded square -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#2a1f0e"/>
      <stop offset="100%" stop-color="#100d06"/>
    </radialGradient>

    <!-- Warm glow behind the bowl -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4622d" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c4622d" stop-opacity="0"/>
    </radialGradient>

    <!-- Bowl body gradient -->
    <linearGradient id="bowlGrad" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#d4954a"/>
      <stop offset="60%" stop-color="#b06a28"/>
      <stop offset="100%" stop-color="#7a3f10"/>
    </linearGradient>

    <!-- Bowl rim gradient -->
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0a55a"/>
      <stop offset="100%" stop-color="#a85f20"/>
    </linearGradient>

    <!-- Soup surface gradient -->
    <radialGradient id="soupGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#9b3d1a"/>
      <stop offset="100%" stop-color="#5a1e08"/>
    </radialGradient>

    <!-- Inner glow filter on bowl -->
    <filter id="bowlGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle drop shadow -->
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Steam glow -->
    <filter id="steamGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Outer card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Outer card -->
  <rect x="10" y="10" width="380" height="380" rx="52" fill="url(#bgGrad)" filter="url(#cardShadow)"/>

  <!-- Grid texture -->
  <rect x="10" y="10" width="380" height="380" rx="52" fill="url(#grid)"/>

  <!-- Warm glow blob behind bowl -->
  <ellipse cx="200" cy="210" rx="140" ry="120" fill="url(#glowGrad)"/>

  <!-- Bowl shadow on floor -->
  <ellipse cx="200" cy="308" rx="88" ry="12" fill="#000" opacity="0.4"/>

  <!-- Bowl body -->
  <g filter="url(#shadow)">
    <path d="M 100 210 Q 98 300 200 308 Q 302 300 300 210 Z" fill="url(#bowlGrad)"/>
  </g>

  <!-- Rim ellipse -->
  <ellipse cx="200" cy="210" rx="100" ry="26" fill="url(#rimGrad)"/>

  <!-- Soup surface -->
  <ellipse cx="200" cy="210" rx="90" ry="20" fill="url(#soupGrad)"/>

  <!-- Soup highlight -->
  <ellipse cx="178" cy="204" rx="28" ry="7" fill="#d4954a" opacity="0.12"/>

  <!-- Herb garnish dots on soup -->
  <ellipse cx="190" cy="209" rx="7" ry="3.5" fill="#3d6b32" transform="rotate(-15 190 209)"/>
  <ellipse cx="203" cy="207" rx="6" ry="3" fill="#4e8a3f" transform="rotate(8 203 207)"/>
  <ellipse cx="213" cy="211" rx="5" ry="2.5" fill="#3d6b32" transform="rotate(-5 213 211)"/>

  <!-- Steam wisps -->
  <g filter="url(#steamGlow)" stroke="#e8c98a" stroke-linecap="round" fill="none">
    <path d="M 163 196 Q 157 178 163 162 Q 169 146 163 130" stroke-width="2.2" opacity="0.5"/>
    <path d="M 200 193 Q 194 173 200 155 Q 206 137 200 119" stroke-width="2.5" opacity="0.6"/>
    <path d="M 237 196 Q 243 178 237 162 Q 231 146 237 130" stroke-width="2.2" opacity="0.5"/>
  </g>

  <!-- Spoon resting across bowl -->
  <g filter="url(#shadow)">
    <!-- Handle -->
    <rect x="258" y="168" width="8" height="80" rx="4" fill="#d4954a" transform="rotate(38 262 208)"/>
    <!-- Spoon bowl -->
    <ellipse cx="236" cy="195" rx="13" ry="9" fill="#d4954a" transform="rotate(38 236 195)"/>
    <!-- Spoon bowl inner -->
    <ellipse cx="235" cy="193" rx="8" ry="5" fill="#b06a28" opacity="0.6" transform="rotate(38 235 193)"/>
  </g>

  <!-- Subtle inner border on card -->
  <rect x="10" y="10" width="380" height="380" rx="52" fill="none" stroke="#c4622d" stroke-width="1" opacity="0.2"/>

  <!-- App name -->
  <text x="200" y="432" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="32" font-weight="800" letter-spacing="-0.5"
    fill="#f2ead8">WeeksRations</text>

  <!-- Tagline -->
  <text x="200" y="460" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="12" font-weight="600" letter-spacing="3"
    fill="#7a6548">YOUR WEEK. SORTED.</text>
</svg>
