<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2010"/>
      <stop offset="100%" stop-color="#131808"/>
    </linearGradient>
    <radialGradient id="iconGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#c4622d" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#c4622d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c4622d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cardBg" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2a1f0e"/>
      <stop offset="100%" stop-color="#0e0a04"/>
    </radialGradient>
    <linearGradient id="bowlGrad" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#d4954a"/>
      <stop offset="55%" stop-color="#b06a28"/>
      <stop offset="100%" stop-color="#7a3f10"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0a55a"/>
      <stop offset="100%" stop-color="#a85f20"/>
    </linearGradient>
    <radialGradient id="soupGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#8b3318"/>
      <stop offset="100%" stop-color="#4a1506"/>
    </radialGradient>
    <filter id="cardShadow" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#000" flood-opacity="0.65"/>
    </filter>
    <filter id="steamGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip for left UI panel -->
    <clipPath id="leftClip">
      <rect x="0" y="0" width="660" height="630"/>
    </clipPath>
    <!-- Right-edge fade on UI panel -->
    <linearGradient id="rightEdgeFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a2010" stop-opacity="0"/>
      <stop offset="75%" stop-color="#1a2010" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1a2010" stop-opacity="1"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#fff" stroke-width="0.4" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- ═══════════════════════════════════════════
       LEFT SIDE — App UI mock (crisp, no blur)
  ═══════════════════════════════════════════ -->
  <g clip-path="url(#leftClip)">

    <!-- Header bar -->
    <rect x="24" y="24" width="612" height="80" rx="0" fill="#2e1a08"/>
    <rect x="24" y="104" width="612" height="1" fill="#3a3820"/>

    <!-- Header: label -->
    <text x="44" y="46" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="10" font-weight="700" letter-spacing="1.5" fill="#b8a98a">THIS WEEK'S DINNERS</text>

    <!-- Header: bowl icon -->
    <g transform="translate(44, 52)">
      <rect width="28" height="28" rx="6" fill="#150e05"/>
      <ellipse cx="14" cy="15" rx="10" ry="2.8" fill="#c4622d" opacity="0.2"/>
      <path d="M4 14 Q3.5 21 14 22 Q24.5 21 24 14 Z" fill="#b06a28"/>
      <ellipse cx="14" cy="14" rx="10" ry="2.5" fill="#d4954a"/>
      <ellipse cx="14" cy="14" rx="8.5" ry="1.8" fill="#5a1e08"/>
      <path d="M9 12.5 Q7.5 9 9 6" stroke="#e8c98a" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.75"/>
      <path d="M14 11.5 Q12.5 8 14 5" stroke="#e8c98a" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0.85"/>
      <path d="M19 12.5 Q20.5 9 19 6" stroke="#e8c98a" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.75"/>
    </g>

    <!-- Header: app name -->
    <text x="80" y="72" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="20" font-weight="800" fill="#f2ead8" letter-spacing="-0.3">WeeksRations</text>

    <!-- Header: week -->
    <text x="44" y="96" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="12" fill="#b8a98a">Week of May 4, 2026</text>

    <!-- Header: cuisine theme badge -->
    <rect x="44" y="58" width="0" height="0"/>

    <!-- Header: tagline -->
    <text x="310" y="70" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="15" font-weight="800" font-style="italic" fill="#d4954a" text-anchor="middle">Cook three times. Eat like you mean it.</text>

    <!-- Header: generate button -->
    <rect x="530" y="52" width="100" height="28" rx="6" fill="#c4622d"/>
    <text x="580" y="70" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="10" font-weight="700" fill="#f2ead8" text-anchor="middle">↺ New Plan</text>

    <!-- Cuisine theme tag -->
    <rect x="44" y="112" width="240" height="20" rx="4" fill="#c4622d22"/>
    <rect x="44" y="112" width="240" height="20" rx="4" fill="none" stroke="#d4954a66" stroke-width="1"/>
    <text x="54" y="126" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="9" font-weight="700" letter-spacing="0.8" fill="#d4954a">MEDITERRANEAN (GREEK, ITALIAN, SPANISH)</text>

    <!-- Section label: DINNERS -->
    <text x="24" y="154" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="10" font-weight="700" letter-spacing="1.5" fill="#b8a98a">DINNERS</text>
    <rect x="24" y="158" width="612" height="1" fill="#3a3820"/>

    <!-- ── Meal Card 1 ── -->
    <rect x="24" y="166" width="612" height="130" rx="12" fill="#242d16" stroke="#3a3820" stroke-width="1"/>
    <!-- Card header -->
    <rect x="24" y="166" width="612" height="56" rx="0" fill="none"/>
    <text x="44" y="188" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="16" font-weight="800" fill="#f2ead8" letter-spacing="-0.3">Harissa-Glazed Chicken Thighs</text>
    <text x="44" y="204" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="11" font-style="italic" fill="#b8a98a">Marinate overnight for best results. Doubles well for lunch the next day.</text>
    <!-- Time badge -->
    <rect x="548" y="178" width="76" height="20" rx="5" fill="#c4622d22" stroke="#d4954a44" stroke-width="1"/>
    <text x="586" y="192" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="9" font-weight="700" letter-spacing="0.5" fill="#d4954a" text-anchor="middle">25 MIN ACTIVE</text>
    <!-- Divider -->
    <rect x="24" y="216" width="612" height="1" fill="#3a3820"/>
    <!-- Ingredients column -->
    <text x="44" y="232" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="9" font-weight="700" letter-spacing="1.2" fill="#c4622d">INGREDIENTS</text>
    <text x="44" y="249" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#b8a98a">· boneless chicken thighs x 4</text>
    <text x="44" y="264" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#b8a98a">· harissa paste x 3 tbsp</text>
    <text x="44" y="279" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#b8a98a">· lemon x 1, garlic x 4 cloves</text>
    <!-- Vertical divider -->
    <rect x="230" y="220" width="1" height="72" fill="#3a3820"/>
    <!-- Recipe steps -->
    <text x="248" y="232" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="9" font-weight="700" letter-spacing="1.2" fill="#c4622d">HOW TO MAKE IT</text>
    <!-- Step 1 -->
    <rect x="248" y="241" width="18" height="18" rx="9" fill="#c4622d"/>
    <text x="257" y="254" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="800" fill="#1a2010" text-anchor="middle">1</text>
    <text x="274" y="254" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#f2ead8">Whisk harissa, lemon juice, garlic, and olive oil.</text>
    <!-- Step 2 -->
    <rect x="248" y="263" width="18" height="18" rx="9" fill="#c4622d"/>
    <text x="257" y="276" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="800" fill="#1a2010" text-anchor="middle">2</text>
    <text x="274" y="276" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#f2ead8">Marinate chicken 30 min or overnight.</text>

    <!-- ── Meal Card 2 ── -->
    <rect x="24" y="304" width="612" height="115" rx="12" fill="#242d16" stroke="#3a3820" stroke-width="1"/>
    <text x="44" y="326" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="16" font-weight="800" fill="#f2ead8" letter-spacing="-0.3">Seared Salmon with Miso Butter</text>
    <text x="44" y="342" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="11" font-style="italic" fill="#b8a98a">Quick weeknight dinner — miso butter goes on right off the heat.</text>
    <rect x="548" y="316" width="76" height="20" rx="5" fill="#c4622d22" stroke="#d4954a44" stroke-width="1"/>
    <text x="586" y="330" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="9" font-weight="700" letter-spacing="0.5" fill="#d4954a" text-anchor="middle">20 MIN ACTIVE</text>
    <rect x="24" y="354" width="612" height="1" fill="#3a3820"/>
    <text x="44" y="370" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#b8a98a">· salmon fillets x 2 (6 oz each)</text>
    <text x="44" y="385" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#b8a98a">· white miso x 2 tbsp, butter x 2 tbsp</text>
    <text x="44" y="400" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#b8a98a">· bok choy x 2 heads, sesame oil</text>
    <rect x="230" y="358" width="1" height="55" fill="#3a3820"/>
    <rect x="248" y="366" width="18" height="18" rx="9" fill="#c4622d"/>
    <text x="257" y="379" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="800" fill="#1a2010" text-anchor="middle">1</text>
    <text x="274" y="379" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#f2ead8">Pat salmon dry, season generously with salt.</text>
    <rect x="248" y="388" width="18" height="18" rx="9" fill="#c4622d"/>
    <text x="257" y="401" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="800" fill="#1a2010" text-anchor="middle">2</text>
    <text x="274" y="401" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#f2ead8">Sear skin-side down 4 min until crispy.</text>

    <!-- ── Meal Card 3 ── -->
    <rect x="24" y="427" width="612" height="100" rx="12" fill="#242d16" stroke="#3a3820" stroke-width="1"/>
    <text x="44" y="449" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="16" font-weight="800" fill="#f2ead8" letter-spacing="-0.3">Spiced Lamb Flatbread</text>
    <text x="44" y="465" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="11" font-style="italic" fill="#b8a98a">Za'atar lamb on toasted flatbread — fast, bold, impressive.</text>
    <rect x="548" y="439" width="76" height="20" rx="5" fill="#c4622d22" stroke="#d4954a44" stroke-width="1"/>
    <text x="586" y="453" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="9" font-weight="700" letter-spacing="0.5" fill="#d4954a" text-anchor="middle">30 MIN ACTIVE</text>
    <rect x="24" y="477" width="612" height="1" fill="#3a3820"/>
    <text x="44" y="493" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#b8a98a">· ground lamb x 1 lb, za'atar x 2 tbsp</text>
    <text x="44" y="508" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#b8a98a">· flatbreads x 4, cherry tomatoes x 1 cup</text>
    <rect x="230" y="481" width="1" height="40" fill="#3a3820"/>
    <rect x="248" y="485" width="18" height="18" rx="9" fill="#c4622d"/>
    <text x="257" y="498" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="800" fill="#1a2010" text-anchor="middle">1</text>
    <text x="274" y="498" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#f2ead8">Brown lamb with za'atar over high heat.</text>

    <!-- ── Snack section ── -->
    <text x="24" y="548" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="10" font-weight="700" letter-spacing="1.5" fill="#b8a98a">SNACK IDEAS</text>
    <rect x="24" y="552" width="612" height="1" fill="#3a3820"/>
    <!-- Snack pills -->
    <rect x="24" y="560" width="118" height="26" rx="13" fill="#242d16" stroke="#3a3820" stroke-width="1"/>
    <text x="83" y="577" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#b8a98a" text-anchor="middle">Marcona almonds</text>
    <rect x="150" y="560" width="104" height="26" rx="13" fill="#242d16" stroke="#3a3820" stroke-width="1"/>
    <text x="202" y="577" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#b8a98a" text-anchor="middle">Apple + PB</text>
    <rect x="262" y="560" width="96" height="26" rx="13" fill="#242d16" stroke="#3a3820" stroke-width="1"/>
    <text x="310" y="577" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#b8a98a" text-anchor="middle">Kettle chips</text>
    <rect x="366" y="560" width="110" height="26" rx="13" fill="#242d16" stroke="#3a3820" stroke-width="1"/>
    <text x="421" y="577" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#b8a98a" text-anchor="middle">String cheese</text>
    <rect x="484" y="560" width="108" height="26" rx="13" fill="#242d16" stroke="#3a3820" stroke-width="1"/>
    <text x="538" y="577" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#b8a98a" text-anchor="middle">Beef jerky</text>

    <!-- ── Grocery section ── -->
    <text x="24" y="608" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
      font-size="10" font-weight="700" letter-spacing="1.5" fill="#b8a98a">GROCERY LIST</text>
    <rect x="24" y="612" width="612" height="1" fill="#3a3820"/>

  </g>

  <!-- Right-edge fade so UI blends into icon section -->
  <rect x="0" y="0" width="660" height="630" fill="url(#rightEdgeFade)"/>

  <!-- ═══════════════════════════════════════════
       RIGHT SIDE — Icon + branding
  ═══════════════════════════════════════════ -->

  <!-- Icon glow halo -->
  <ellipse cx="920" cy="280" rx="220" ry="200" fill="url(#iconGlow)"/>

  <!-- Icon card -->
  <g filter="url(#cardShadow)">
    <rect x="770" y="90" width="300" height="300" rx="56" fill="url(#cardBg)"/>
  </g>
  <rect x="770" y="90" width="300" height="300" rx="56" fill="url(#grid)" opacity="0.7"/>
  <rect x="770" y="90" width="300" height="300" rx="56" fill="none" stroke="#c4622d" stroke-width="1.5" opacity="0.22"/>

  <!-- Bowl icon centered at 920,240 -->
  <!-- Bowl shadow -->
  <ellipse cx="920" cy="322" rx="88" ry="10" fill="#000" opacity="0.4"/>
  <!-- Bowl body -->
  <path d="M 812 242 Q 810 316 920 324 Q 1030 316 1028 242 Z" fill="url(#bowlGrad)"/>
  <!-- Rim -->
  <ellipse cx="920" cy="242" rx="108" ry="26" fill="url(#rimGrad)"/>
  <!-- Soup surface -->
  <ellipse cx="920" cy="242" rx="96" ry="20" fill="url(#soupGrad)"/>
  <!-- Soup highlight -->
  <ellipse cx="898" cy="236" rx="30" ry="7" fill="#d4954a" opacity="0.12"/>
  <!-- Herb garnish -->
  <ellipse cx="906" cy="241" rx="9" ry="4" fill="#3d6b32" transform="rotate(-15 906 241)"/>
  <ellipse cx="922" cy="238" rx="7" ry="3.5" fill="#4e8a3f" transform="rotate(8 922 238)"/>
  <ellipse cx="936" cy="243" rx="6" ry="3" fill="#3d6b32" transform="rotate(-5 936 243)"/>
  <!-- Steam wisps -->
  <g filter="url(#steamGlow)" stroke="#e8c98a" stroke-linecap="round" fill="none">
    <path d="M 884 228 Q 876 205 884 183 Q 892 161 884 139" stroke-width="2.8" opacity="0.6"/>
    <path d="M 920 224 Q 912 199 920 175 Q 928 151 920 127" stroke-width="3.2" opacity="0.7"/>
    <path d="M 956 228 Q 964 205 956 183 Q 948 161 956 139" stroke-width="2.8" opacity="0.6"/>
  </g>
  <!-- Spoon -->
  <rect x="978" y="188" width="10" height="88" rx="5" fill="#d4954a" transform="rotate(38 983 232)"/>
  <ellipse cx="953" cy="228" rx="16" ry="11" fill="#d4954a" transform="rotate(38 953 228)"/>
  <ellipse cx="952" cy="226" rx="10" ry="6" fill="#b06a28" opacity="0.55" transform="rotate(38 952 226)"/>

  <!-- App name -->
  <text x="920" y="436" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="36" font-weight="800" letter-spacing="-0.5" fill="#f2ead8">WeeksRations</text>

  <!-- Tagline -->
  <text x="920" y="464" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="13" font-weight="600" letter-spacing="3.5" fill="#7a6548">YOUR WEEK. SORTED.</text>

  <!-- Live dot -->
  <circle cx="920" cy="492" r="4" fill="#d4954a" opacity="0.6"/>

</svg>
